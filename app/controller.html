<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>LRBridge Web Controller</title>
    <style>
        body {
            margin: 0;
            background: #101418;
            color: #d7e1ea;
            font-family: Segoe UI, Arial, sans-serif;
        }

        header {
            padding: 18px 22px;
            background: #161d24;
            border-bottom: 1px solid #28323d;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
        }

        .subtitle {
            margin-top: 6px;
            color: #9fb0bf;
            font-size: 14px;
            line-height: 1.45;
        }

        .toolbar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            padding: 14px 22px;
            background: #111820;
            border-bottom: 1px solid #28323d;
        }

        .tabs {
            display: flex;
            gap: 2px;
            flex-wrap: wrap;
            padding: 0 22px;
            background: #0b1117;
            border-bottom: 1px solid #25313d;
        }

        .tab-button {
            position: relative;
            background: transparent;
            color: #8fa2b3;
            border: 0;
            border-radius: 0;
            padding: 15px 18px 13px 18px;
            font-weight: 600;
            letter-spacing: 0.01em;
        }

        .tab-button:hover {
            background: #121b25;
            color: #d7e1ea;
        }

        .tab-button.active {
            background: #151f2a;
            color: #ffffff;
            box-shadow: inset 0 -3px 0 #ffb454;
        }

        .tab-button.active:hover {
            background: #182432;
            color: #ffffff;
        }

        .content {
            padding: 16px 22px;
        }

        .group {
            margin-bottom: 22px;
        }

        .group-title {
            color: #8fa2b3;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 8px;
        }

        .row {
            display: grid;
            grid-template-columns: 240px repeat(5, 70px) minmax(180px, 1fr);
            gap: 8px;
            align-items: center;
            margin-bottom: 8px;
        }

        .switch-row {
            display: grid;
            grid-template-columns: 240px 90px 90px 1fr;
            gap: 8px;
            align-items: center;
            margin-bottom: 8px;
        }

        .action-row {
            display: grid;
            grid-template-columns: 240px 140px 1fr;
            gap: 8px;
            align-items: center;
            margin-bottom: 8px;
        }

        .slider-name {
            background: #18212a;
            border: 1px solid #2b3744;
            border-radius: 8px;
            padding: 10px 12px;
        }

        .switch-status {
            color: #ffb454;
            font-size: 13px;
        }

        button {
            background: #273442;
            color: #ffffff;
            border: 1px solid #3b4b5c;
            border-radius: 7px;
            padding: 10px 10px;
            font-size: 14px;
            cursor: pointer;
        }

        button:hover {
            background: #314151;
        }

        button:disabled {
            cursor: not-allowed;
            opacity: 0.45;
        }

        button:disabled:hover {
            background: #273442;
        }

        button.positive {
            background: #2a6f97;
            border-color: #3a8cc0;
        }

        button.positive:hover {
            background: #327eab;
        }

        button.negative {
            background: #5c3442;
            border-color: #7a4756;
        }

        button.negative:hover {
            background: #6b3c4d;
        }

        button.reset {
            background: #7a4f24;
            border-color: #9b6530;
        }

        button.reset:hover {
            background: #8a5a2a;
        }

        .drag-strip {
            position: relative;
            min-height: 40px;
            border: 1px solid #3b4b5c;
            border-radius: 999px;
            background: #0b1117;
            color: #8fa2b3;
            cursor: ew-resize;
            user-select: none;
            touch-action: none;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .drag-strip::before {
            content: "";
            position: absolute;
            left: 12px;
            right: 12px;
            top: 50%;
            height: 2px;
            background: #33414f;
            transform: translateY(-50%);
        }

        .drag-strip::after {
            content: "";
            position: absolute;
            left: 50%;
            top: 8px;
            bottom: 8px;
            width: 2px;
            background: #506173;
            transform: translateX(-50%);
        }

        .drag-strip.active {
            border-color: #ffb454;
            background: #111820;
            color: #ffffff;
        }

        .drag-strip-label {
            position: relative;
            z-index: 1;
            background: #0b1117;
            border-radius: 999px;
            padding: 2px 9px;
            pointer-events: none;
        }

        .slider-jump-control {
            position: sticky;
            top: 0;
            z-index: 30;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0 12px;
            margin: 0 0 14px;
            background: #101820;
            border-bottom: 1px solid #26313d;
        }

        .slider-jump-label {
            color: #9fb4c8;
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
        }

        .slider-jump-main-button {
            min-width: 190px;
            min-height: 44px;
            border: 1px solid #d18a36;
            border-radius: 12px;
            background: #111111;
            color: #f4f4f4;
            padding: 10px 14px;
            font-size: 15px;
            font-weight: 600;
            text-align: left;
            cursor: pointer;
        }

        .slider-jump-main-button:hover {
            background: #1a1a1a;
            border-color: #f0a64a;
        }

        .slider-jump-main-button.active {
            background: #111111;
            border-color: #f0a64a;
            color: #ffffff;
            box-shadow: 0 0 0 2px rgba(240, 166, 74, 0.22);
        }

        .slider-jump-popover {
            position: absolute;
            left: 0;
            top: calc(100% - 2px);
            width: min(620px, calc(100vw - 42px));
            max-height: min(70vh, 620px);
            overflow-y: auto;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
            padding: 14px;
            border: 2px solid #d18a36;
            border-radius: 16px;
            background: linear-gradient(180deg, #7a4c18 0%, #5f3912 100%);
            box-shadow: 0 20px 55px rgba(0, 0, 0, 0.68), 0 0 0 2px rgba(209, 138, 54, 0.22);
        }

        .slider-jump-popover[hidden] {
            display: none;
        }

        .slider-jump-option {
            min-height: 54px;
            border: 1px solid #2a2a2a;
            border-radius: 13px;
            background: #101010;
            color: #f4f4f4;
            padding: 10px 12px;
            font-size: 15px;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
        }

        .slider-jump-option:hover,
        .slider-jump-option:focus {
            background: #1a1a1a;
            border-color: #f0a64a;
        }

        .slider-jump-target {
            scroll-margin-top: 78px;
        }

        @media (max-width: 720px) {
            .slider-jump-control {
                align-items: stretch;
                flex-direction: column;
            }

            .slider-jump-main-button {
                width: 100%;
            }

            .slider-jump-popover {
                width: calc(100vw - 42px);
                grid-template-columns: 1fr;
            }
        }

        .status {
            margin: 0 22px 16px 22px;
            background: #050708;
            border: 1px solid #2b3744;
            border-radius: 8px;
            padding: 12px;
            font-family: Consolas, monospace;
            font-size: 13px;
            min-height: 20px;
            white-space: pre-wrap;
        }

        a {
            color: #6dc8ff;
        }

        @media (max-width: 760px) {
            .row,
            .switch-row,
            .action-row {
                grid-template-columns: 1fr;
                background: #18212a;
                border: 1px solid #2b3744;
                border-radius: 8px;
                padding: 10px;
            }

            .slider-name {
                border: 0;
                padding: 0 0 6px 0;
            }
        }        .slider-feedback {
            display: block;
            margin-top: 4px;
            color: #9fb0bf;
            font-size: 12px;
            font-weight: 400;
        }

        .slider-feedback.active {
            color: #7cc7ff;
        }

        .slider-feedback.error {
            color: #ff9b9b;
        }

        function setStatus(message) {

        }

        function formatResponseText(text) {
            if (!text) {
                return "";
            }

            try {
                const data = JSON.parse(text);

                if (data.error) {
                    return data.error;
                }

                if (data.queued && data.queued.command) {
                    const slider = data.queued.slider ? " " + data.queued.slider : "";
                    const amount = data.queued.amount !== undefined ? " " + data.queued.amount : "";
                    const action = data.queued.action ? " " + data.queued.action : "";

                    return data.queued.command + slider + amount + action;
                }

                if (data.ok === true) {
                    return "Command accepted";
                }

                return JSON.stringify(data);
            } catch (err) {
                return text;
            }
        }

        async function sendCommand(path) {
            setStatus("Sending: " + path);

            try {
                const response = await fetch(path, {
                    cache: "no-store"
                });

                const text = await response.text();
                const detail = formatResponseText(text);

                if (!response.ok) {
                    setStatus("ERROR " + response.status + ": " + detail);
                    return;
                }

                setStatus("OK: " + detail);
            } catch (err) {
                setStatus("ERROR: " + err.message);
            }
        }
        function makeButton(text, className, onClick) {
            const button = document.createElement("button");
            button.textContent = text;
            button.className = className;
            button.addEventListener("click", onClick);
            return button;
        }
        const autoActionCooldownMs = 2200;
        const autoActionCooldownActions = new Set(["setAutoTone", "setAutoWhiteBalance"]);

        const autoActionButtons = {};
        let autoActionCooldownUntil = 0;
        let autoActionCooldownTimer = null;

        function isAutoActionCooldownActive() {
            return Date.now() < autoActionCooldownUntil;
        }

        function isAutoActionCooldownActiveFor(action) {
            return autoActionCooldownActions.has(action) && isAutoActionCooldownActive();
        }

        function updateAutoActionButtons() {
            const remainingMs = Math.max(0, autoActionCooldownUntil - Date.now());

            Object.keys(autoActionButtons).forEach(function (action) {
                const button = autoActionButtons[action];

                if (!button) {
                    return;
                }

                if (remainingMs > 0) {
                    const remainingSeconds = Math.ceil(remainingMs / 1000);
                    button.disabled = true;
                    button.textContent = "Wait " + remainingSeconds + "s";
                    return;
                }

                button.disabled = false;
                button.textContent = button.dataset.originalText || "Set";
            });
        }

        function startAutoActionCooldown() {
            autoActionCooldownUntil = Date.now() + autoActionCooldownMs;

            if (autoActionCooldownTimer !== null) {
                clearInterval(autoActionCooldownTimer);
            }

            updateAutoActionButtons();

            autoActionCooldownTimer = setInterval(function () {
                updateAutoActionButtons();

                if (!isAutoActionCooldownActive()) {
                    clearInterval(autoActionCooldownTimer);
                    autoActionCooldownTimer = null;
                }
            }, 250);
        }

        function markSliderCommandSent() {
            startAutoActionCooldown();
        }

        function registerAutoActionButton(action, button) {
            if (!autoActionCooldownActions.has(action)) {
                return;
            }

            autoActionButtons[action] = button;
            button.dataset.originalText = button.dataset.originalText || button.textContent || "Set";
            updateAutoActionButtons();
        }

        function getSliderJumpSections() {
            const names = [];

            function add(name) {
                if (!name || names.includes(name)) {
                    return;
                }

                names.push(name);
            }

            if (typeof sliderGroups !== "undefined") {
                sliderGroups.forEach(function (group) {
                    add(group.name);
                });
            }

            if (typeof switchGroups !== "undefined") {
                switchGroups.forEach(function (group) {
                    add(group.name);
                });
            }

            return names;
        }

        function findSliderJumpHeading(content, name) {
            const candidates = Array.from(content.querySelectorAll(
                "h1, h2, h3, h4, .group-title, .section-title, .slider-group-title, .action-group-title, [class*='title'], [class*='Title']"
            ));

            return candidates.find(function (element) {
                return !element.closest(".slider-jump-control") &&
                    element.textContent.trim() === name;
            });
        }

        function installSliderJumpMenu() {
            const contentHost = document.getElementById("content");

            if (!contentHost) {
                return;
            }

            const existing = contentHost.querySelector(".slider-jump-control");

            if (!contentHost.querySelector(".drag-strip")) {
                if (existing) {
                    existing.remove();
                }

                return;
            }

            if (existing) {
                return;
            }

            const sections = getSliderJumpSections()
                .map(function (name, index) {
                    const heading = findSliderJumpHeading(contentHost, name);

                    if (!heading) {
                        return null;
                    }

                    const id = "slider-jump-section-" + index + "-" + name
                        .toLowerCase()
                        .replace(/[^a-z0-9]+/g, "-")
                        .replace(/^-|-$/g, "");

                    heading.id = id;
                    heading.classList.add("slider-jump-target");

                    return {
                        id: id,
                        name: name
                    };
                })
                .filter(Boolean);

            if (sections.length === 0) {
                return;
            }

            const control = document.createElement("div");
            control.className = "slider-jump-control";

            const label = document.createElement("span");
            label.className = "slider-jump-label";
            label.textContent = "Jump to:";

            const mainButton = document.createElement("button");
            mainButton.type = "button";
            mainButton.className = "slider-jump-main-button";
            mainButton.textContent = "Section ▾";
            mainButton.setAttribute("aria-expanded", "false");

            const popover = document.createElement("div");
            popover.className = "slider-jump-popover";
            popover.hidden = true;

            function closeMenu() {
                popover.hidden = true;
                mainButton.classList.remove("active");
                mainButton.setAttribute("aria-expanded", "false");
            }

            function openMenu() {
                popover.hidden = false;
                mainButton.classList.add("active");
                mainButton.setAttribute("aria-expanded", "true");
            }

            mainButton.addEventListener("click", function () {
                if (popover.hidden) {
                    openMenu();
                } else {
                    closeMenu();
                }
            });

            sections.forEach(function (section) {
                const option = document.createElement("button");
                option.type = "button";
                option.className = "slider-jump-option";
                option.textContent = section.name;

                option.addEventListener("click", function () {
                    const target = document.getElementById(section.id);

                    mainButton.textContent = section.name + " ▾";
                    closeMenu();

                    if (target) {
                        target.scrollIntoView({
                            behavior: "smooth",
                            block: "start"
                        });
                    }
                });

                popover.appendChild(option);
            });

            document.addEventListener("pointerdown", function (event) {
                if (!control.contains(event.target)) {
                    closeMenu();
                }
            });

            document.addEventListener("keydown", function (event) {
                if (event.key === "Escape") {
                    closeMenu();
                }
            });

            control.appendChild(label);
            control.appendChild(mainButton);
            control.appendChild(popover);

            contentHost.insertBefore(control, contentHost.firstChild);
        }

        function startSliderJumpMenuObserver() {
            const contentHost = document.getElementById("content");

            if (!contentHost || typeof MutationObserver === "undefined") {
                installSliderJumpMenu();
                return;
            }

            const observer = new MutationObserver(function () {
                window.requestAnimationFrame(installSliderJumpMenu);
            });

            observer.observe(contentHost, {
                childList: true
            });

            installSliderJumpMenu();
        }

        if (document.readyState === "loading") {
            document.addEventListener("DOMContentLoaded", startSliderJumpMenuObserver);
        } else {
            window.requestAnimationFrame(startSliderJumpMenuObserver);
        }

        const sliderFeedbackElements = {};


        const sliderFeedbackUiRequestIds = {};



        function sleep(ms) {


            return new Promise(function (resolve) {


                setTimeout(resolve, ms);


            });


        }



        function formatSliderFeedbackValue(value) {


            const numericValue = Number(value);



            if (Number.isFinite(numericValue)) {


                return String(Math.round(numericValue * 100) / 100);


            }



            if (value === null || value === undefined || value === "nil") {


                return "not available";


            }



            return String(value);


        }



        function setSliderFeedback(slider, text, className) {


            const element = sliderFeedbackElements[slider];



            if (!element) {


                return;


            }



            element.className = "slider-feedback" + (className ? " " + className : "");


            element.textContent = text;


        }



        async function pollFeedbackValue(slider, requestId, timeoutMs) {


            const startedAt = Date.now();



            while (Date.now() - startedAt < timeoutMs) {


                const response = await fetch("/api/feedback/value?slider=" + encodeURIComponent(slider), {


                    cache: "no-store"


                });



                const data = await response.json();


                const result = data && data.result ? data.result : null;



                if (result && result.id === requestId) {


                    return result;


                }



                await sleep(120);


            }



            return null;


        }



        async function requestSliderFeedback(slider) {


            if (!feedbackSupportedSliders.has(slider)) {


                return;


            }



            sliderFeedbackUiRequestIds[slider] = (sliderFeedbackUiRequestIds[slider] || 0) + 1;


            const uiRequestId = sliderFeedbackUiRequestIds[slider];



            setSliderFeedback(slider, "Lightroom: waiting...", "active");



            try {


                await sleep(300);



                if (sliderFeedbackUiRequestIds[slider] !== uiRequestId) {


                    return;


                }



                const requestResponse = await fetch("/api/feedback/request?slider=" + encodeURIComponent(slider), {


                    cache: "no-store"


                });



                const requestData = await requestResponse.json();


                const request = requestData && requestData.request ? requestData.request : null;



                if (!request || !request.id) {


                    setSliderFeedback(slider, "Lightroom: feedback request failed", "error");


                    return;


                }



                const result = await pollFeedbackValue(slider, request.id, 3000);



                if (sliderFeedbackUiRequestIds[slider] !== uiRequestId) {


                    return;


                }



                if (!result) {


                    setSliderFeedback(slider, "Lightroom: timeout", "error");


                    return;


                }



                setSliderFeedback(slider, "Lightroom: " + formatSliderFeedbackValue(result.value), "active");


            } catch (err) {


                setSliderFeedback(slider, "Lightroom: feedback error", "error");


            }


        }



        let liveFeedbackPollingStarted = false;
        let liveFeedbackSnapshotInFlight = false;

        async function updateSliderFeedbackFromCache() {
            try {
                const response = await fetch("/api/feedback/all", {
                    cache: "no-store"
                });

                const data = await response.json();
                const values = data && data.values ? data.values : {};

                Object.keys(sliderFeedbackElements).forEach(function (slider) {
                    const result = values[slider];

                    if (!result || result.value === null || result.value === undefined || result.value === "nil") {
                        return;
                    }

                    setSliderFeedback(slider, "Lightroom: " + formatSliderFeedbackValue(result.value), "active");
                });
            } catch (err) {
                /* Ignore temporary feedback polling errors. */
            }
        }

        function getVisibleFeedbackSliders() {
            const visibleSliders = [];
            const viewportHeight = window.innerHeight || document.documentElement.clientHeight || 0;
            const viewportWidth = window.innerWidth || document.documentElement.clientWidth || 0;
            const buffer = 160;

            Object.keys(sliderFeedbackElements).forEach(function (slider) {
                const element = sliderFeedbackElements[slider];

                if (!element || !element.getBoundingClientRect) {
                    return;
                }

                const rect = element.getBoundingClientRect();

                if (
                    rect.bottom >= -buffer &&
                    rect.top <= viewportHeight + buffer &&
                    rect.right >= -buffer &&
                    rect.left <= viewportWidth + buffer
                ) {
                    visibleSliders.push(slider);
                }
            });

            return visibleSliders;
        }

        async function requestLiveFeedbackSnapshot() {
            if (liveFeedbackSnapshotInFlight) {
                return;
            }

            const visibleSliders = getVisibleFeedbackSliders();

            if (visibleSliders.length === 0) {
                await updateSliderFeedbackFromCache();
                return;
            }

            liveFeedbackSnapshotInFlight = true;

            try {
                await fetch("/api/feedback/request-many?sliders=" + encodeURIComponent(visibleSliders.join(",")), {
                    cache: "no-store"
                });

                await sleep(80);

                await updateSliderFeedbackFromCache();
            } catch (err) {
                /* Ignore temporary feedback request errors. */
            } finally {
                liveFeedbackSnapshotInFlight = false;
            }
        }

        function startLiveFeedbackPolling() {
            if (liveFeedbackPollingStarted) {
                return;
            }

            liveFeedbackPollingStarted = true;

            requestLiveFeedbackSnapshot();

            setInterval(function () {
                requestLiveFeedbackSnapshot();
            }, 250);
        }

        function sendAdjust(slider, amount) {
            markSliderCommandSent();
            sendCommand("/api/adjust?slider=" + encodeURIComponent(slider) + "&amount=" + encodeURIComponent(amount));
            requestSliderFeedback(slider);
        }

        function makeDragStrip(slider) {
            const strip = document.createElement("div");
            strip.className = "drag-strip";
            strip.title = "Drag left or right to adjust " + (labels[slider] || slider);

            const label = document.createElement("div");
            label.className = "drag-strip-label";
            label.textContent = "Drag";

            strip.appendChild(label);

            const pixelsPerStep = 18;
            const flushDelayMs = 50;

            let active = false;
            let pointerId = null;
            let lastX = 0;
            let remainder = 0;
            let pendingAmount = 0;
            let flushTimer = null;

            function flushPending() {
                if (flushTimer !== null) {
                    clearTimeout(flushTimer);
                    flushTimer = null;
                }

                const amount = pendingAmount;
                pendingAmount = 0;

                if (amount !== 0) {
                    sendAdjust(slider, amount);
                }
            }

            function scheduleFlush() {
                if (flushTimer !== null) {
                    return;
                }

                flushTimer = setTimeout(function () {
                    flushTimer = null;

                    const amount = pendingAmount;
                    pendingAmount = 0;

                    if (amount !== 0) {
                        sendAdjust(slider, amount);
                    }
                }, flushDelayMs);
            }

            function queueSteps(steps) {
                if (steps === 0) {
                    return;
                }

                pendingAmount += steps;
                label.textContent = steps > 0 ? "+" + steps : String(steps);
                strip.classList.add("active");
                scheduleFlush();
            }

            function stopDragging(event) {
                if (!active) {
                    return;
                }

                if (event && pointerId !== null && event.pointerId !== pointerId) {
                    return;
                }

                flushPending();

                active = false;

                if (pointerId !== null && strip.releasePointerCapture) {
                    try {
                        strip.releasePointerCapture(pointerId);
                    } catch (err) {
                        /* Pointer may already be released. */
                    }
                }

                pointerId = null;
                remainder = 0;
                label.textContent = "Drag";
                strip.classList.remove("active");
            }

            strip.addEventListener("pointerdown", function (event) {
                active = true;
                pointerId = event.pointerId;
                lastX = event.clientX;
                remainder = 0;
                pendingAmount = 0;
                label.textContent = "Drag";
                strip.classList.add("active");

                if (strip.setPointerCapture) {
                    strip.setPointerCapture(pointerId);
                }

                event.preventDefault();
            });

            strip.addEventListener("pointermove", function (event) {
                if (!active || event.pointerId !== pointerId) {
                    return;
                }

                const dx = event.clientX - lastX;
                lastX = event.clientX;
                remainder += dx;

                const steps = Math.trunc(remainder / pixelsPerStep);

                if (steps !== 0) {
                    remainder -= steps * pixelsPerStep;
                    queueSteps(steps);
                }

                event.preventDefault();
            });

            strip.addEventListener("pointerup", stopDragging);
            strip.addEventListener("pointercancel", stopDragging);
            strip.addEventListener("lostpointercapture", stopDragging);

            return strip;
        }

        function clearContent() {
            content.innerHTML = "";
        }

        function renderTabs() {
            tabsElement.innerHTML = "";

            const allTabs = [
                {
                    id: "sliders",
                    label: "Sliders"
                }
            ].concat(toolTabs.map(function (tab) {
                return {
                    id: tab.id,
                    label: tab.label
                };
            }));

            for (const tab of allTabs) {
                const button = document.createElement("button");
                button.textContent = tab.label;
                button.className = "tab-button" + (tab.id === activeTab ? " active" : "");

                button.addEventListener("click", function () {
                    activeTab = tab.id;
                    render();
});

                tabsElement.appendChild(button);
            }
        }

        function addActionRow(groupElement, item) {
            const row = document.createElement("div");
            row.className = "action-row";

            const name = document.createElement("div");
            name.className = "slider-name";
            name.textContent = item.label;

            const status = document.createElement("div");
            status.className = "switch-status";

            row.appendChild(name);

            const actionButton = makeButton(item.button || "Send", "positive", function () {
                if (isAutoActionCooldownActiveFor(item.action)) {
                    setStatus("Auto Tone / Auto White Balance is waiting for Lightroom to finish the last slider command.");
                    return;
                }

                sendCommand("/api/action?action=" + encodeURIComponent(item.action));
                status.textContent = "Sent to Lightroom";
            });
            registerAutoActionButton(item.action, actionButton);

            row.appendChild(actionButton);
            row.appendChild(status);

            groupElement.appendChild(row);
        }

        function addSwitchRow(groupElement, item) {
            const row = document.createElement("div");
            row.className = "switch-row";

            const name = document.createElement("div");
            name.className = "slider-name";
            name.textContent = item.label;

            const status = document.createElement("div");
            status.className = "switch-status";

            row.appendChild(name);

            row.appendChild(makeButton("Off", "negative", function () {
                markSliderCommandSent();
                sendCommand("/api/adjust?slider=" + encodeURIComponent(item.slider) + "&amount=-5");
                status.textContent = "Sent OFF";
            }));

            row.appendChild(makeButton("On", "positive", function () {
                markSliderCommandSent();
                sendCommand("/api/adjust?slider=" + encodeURIComponent(item.slider) + "&amount=5");
                status.textContent = "Sent ON";
            }));

            row.appendChild(status);

            groupElement.appendChild(row);
        }

        function addSliderRow(groupElement, slider) {
            const row = document.createElement("div");
            row.className = "row";

            const name = document.createElement("div");
            name.className = "slider-name";
            name.textContent = labels[slider] || slider;

            
            if (feedbackSupportedSliders.has(slider)) {
                const feedback = document.createElement("span");
                feedback.className = "slider-feedback";
                feedback.textContent = "Lightroom: --";
                name.appendChild(feedback);
                sliderFeedbackElements[slider] = feedback;
            }
row.appendChild(name);

            row.appendChild(makeButton("-5", "negative", function () {
                sendAdjust(slider, -5);
            }));

            row.appendChild(makeButton("-1", "negative", function () {
                sendAdjust(slider, -1);
            }));

            row.appendChild(makeButton("Reset", "reset", function () {
                markSliderCommandSent();
                sendCommand("/api/reset?slider=" + encodeURIComponent(slider));
                            requestSliderFeedback(slider);
            }));

            row.appendChild(makeButton("+1", "positive", function () {
                sendAdjust(slider, 1);
            }));

            row.appendChild(makeButton("+5", "positive", function () {
                sendAdjust(slider, 5);
            }));

            row.appendChild(makeDragStrip(slider));

            groupElement.appendChild(row);
        }

        function renderActionGroup(group) {
            const groupElement = document.createElement("section");
            groupElement.className = "group";

            const title = document.createElement("div");
            title.className = "group-title";
            title.textContent = group.name;

            groupElement.appendChild(title);

            for (const item of group.actions) {
                addActionRow(groupElement, item);
            }

            content.appendChild(groupElement);
        }

        function renderSwitchGroup(group) {
            const groupElement = document.createElement("section");
            groupElement.className = "group";

            const title = document.createElement("div");
            title.className = "group-title";
            title.textContent = "Switches - " + group.name;

            groupElement.appendChild(title);

            for (const item of group.switches) {
                addSwitchRow(groupElement, item);
            }

            content.appendChild(groupElement);
        }

        function renderActionsForPlacement(placement) {
            for (const group of sliderActionGroups) {
                if ((group.placement || "top") === placement) {
                    renderActionGroup(group);
                }
            }
        }

        function renderSwitchesForPlacement(placement) {
            for (const group of switchGroups) {
                if ((group.placement || "top") === placement) {
                    renderSwitchGroup(group);
                }
            }
        }

        function renderSlidersTab() {
            for (const group of sliderGroups) {
                renderActionsForPlacement("before:" + group.name);
                renderSwitchesForPlacement("before:" + group.name);

                const groupElement = document.createElement("section");
                groupElement.className = "group";

                const title = document.createElement("div");
                title.className = "group-title";
                title.textContent = group.name;

                groupElement.appendChild(title);

                for (const slider of group.sliders) {
                    addSliderRow(groupElement, slider);
                }

                content.appendChild(groupElement);
            }
        }

        function renderToolTab(tab) {
            const groupElement = document.createElement("section");
            groupElement.className = "group";

            const title = document.createElement("div");
            title.className = "group-title";
            title.textContent = tab.title;

            groupElement.appendChild(title);

            for (const item of tab.actions) {
                addActionRow(groupElement, item);
            }

            content.appendChild(groupElement);
        }

        function render() {
            renderTabs();
            clearContent();

            if (activeTab === "sliders") {
                renderSlidersTab();
                return;
            }

            const tab = toolTabs.find(function (item) {
                return item.id === activeTab;
            });

            if (tab) {
                renderToolTab(tab);
            }
        }

        document.getElementById("openHelp").addEventListener("click", function () {
            window.open("/help", "_blank");
        });

        render();
        startLiveFeedbackPolling();
    </script>
