<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <title>LRBridge Web Controller</title>
    <style>
        body {
            margin: 0;
            background: #101418;
            color: #d7e1ea;
            font-family: Segoe UI, Arial, sans-serif;
        }

        header {
            padding: 18px 22px;
            background: #161d24;
            border-bottom: 1px solid #28323d;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
        }

        .subtitle {
            margin-top: 6px;
            color: #9fb0bf;
            font-size: 14px;
            line-height: 1.45;
        }

        .toolbar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            padding: 14px 22px;
            background: #111820;
            border-bottom: 1px solid #28323d;
        }

        .content {
            padding: 16px 22px;
        }

        .group {
            margin-bottom: 22px;
        }

        .group-title {
            color: #8fa2b3;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 8px;
        }

        .row {
            display: grid;
            grid-template-columns: 240px repeat(5, 70px);
            gap: 8px;
            align-items: center;
            margin-bottom: 8px;
        }

        .switch-row {
            display: grid;
            grid-template-columns: 240px 90px 90px 1fr;
            gap: 8px;
            align-items: center;
            margin-bottom: 8px;
        }

        .action-row {
            display: grid;
            grid-template-columns: 240px 140px 1fr;
            gap: 8px;
            align-items: center;
            margin-bottom: 8px;
        }

        .slider-name {
            background: #18212a;
            border: 1px solid #2b3744;
            border-radius: 8px;
            padding: 10px 12px;
        }

        .switch-status {
            color: #ffb454;
            font-size: 13px;
        }

        button {
            background: #273442;
            color: #ffffff;
            border: 1px solid #3b4b5c;
            border-radius: 7px;
            padding: 10px 10px;
            font-size: 14px;
            cursor: pointer;
        }

        button:hover {
            background: #314151;
        }

        button.positive {
            background: #2a6f97;
            border-color: #3a8cc0;
        }

        button.positive:hover {
            background: #327eab;
        }

        button.negative {
            background: #5c3442;
            border-color: #7a4756;
        }

        button.negative:hover {
            background: #6b3c4d;
        }

        button.reset {
            background: #7a4f24;
            border-color: #9b6530;
        }

        button.reset:hover {
            background: #8a5a2a;
        }

        .status {
            margin: 0 22px 16px 22px;
            background: #050708;
            border: 1px solid #2b3744;
            border-radius: 8px;
            padding: 12px;
            font-family: Consolas, monospace;
            font-size: 13px;
            min-height: 20px;
            white-space: pre-wrap;
        }

        a {
            color: #6dc8ff;
        }

        @media (max-width: 760px) {
            .row,
            .switch-row {
                grid-template-columns: 1fr;
                background: #18212a;
                border: 1px solid #2b3744;
                border-radius: 8px;
                padding: 10px;
            }

            .slider-name {
                border: 0;
                padding: 0 0 6px 0;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>LRBridge Web Controller</h1>
        <div class="subtitle">
            This page only sends commands to Lightroom Classic.
            It does not read current slider positions or show live feedback.
            This experimental branch exposes many placeholder sliders for testing.
            Watch Lightroom Classic to see the real result.
        </div>
    </header>

    <div class="toolbar">
        <button id="openHelp">Open API Help</button>
    </div>

    <main class="content" id="content"></main>

    <div class="status" id="status">Ready.</div>

    <script>
        const groups = [
        {
                "name": "Basic",
                "sliders": [
                        "Exposure",
                        "Contrast",
                        "Highlights",
                        "Shadows",
                        "Whites",
                        "Blacks"
                ]
        },
        {
                "name": "Color",
                "sliders": [
                        "Temperature",
                        "Tint",
                        "Vibrance",
                        "Saturation"
                ]
        },
        {
                "name": "Presence",
                "sliders": [
                        "Texture",
                        "Clarity",
                        "Dehaze"
                ]
        },
        {
                "name": "Detail",
                "sliders": [
                        "Sharpness",
                        "SharpenRadius",
                        "SharpenDetail",
                        "SharpenEdgeMasking",
                        "LuminanceNR",
                        "LuminanceNoiseReductionDetail",
                        "LuminanceNoiseReductionContrast",
                        "ColorNR",
                        "ColorNoiseReductionDetail",
                        "ColorNoiseReductionSmoothness"
                ]
        },
        {
                "name": "Color Mixer / HSL",
                "sliders": [
                        "HueAdjustmentRed",
                        "HueAdjustmentOrange",
                        "HueAdjustmentYellow",
                        "HueAdjustmentGreen",
                        "HueAdjustmentAqua",
                        "HueAdjustmentBlue",
                        "HueAdjustmentPurple",
                        "HueAdjustmentMagenta",
                        "SaturationAdjustmentRed",
                        "SaturationAdjustmentOrange",
                        "SaturationAdjustmentYellow",
                        "SaturationAdjustmentGreen",
                        "SaturationAdjustmentAqua",
                        "SaturationAdjustmentBlue",
                        "SaturationAdjustmentPurple",
                        "SaturationAdjustmentMagenta",
                        "LuminanceAdjustmentRed",
                        "LuminanceAdjustmentOrange",
                        "LuminanceAdjustmentYellow",
                        "LuminanceAdjustmentGreen",
                        "LuminanceAdjustmentAqua",
                        "LuminanceAdjustmentBlue",
                        "LuminanceAdjustmentPurple",
                        "LuminanceAdjustmentMagenta"
                ]
        },
        {
                "name": "B&W Mixer",
                "sliders": [
                        "GrayMixerRed",
                        "GrayMixerOrange",
                        "GrayMixerYellow",
                        "GrayMixerGreen",
                        "GrayMixerAqua",
                        "GrayMixerBlue",
                        "GrayMixerPurple",
                        "GrayMixerMagenta"
                ]
        },
        {
                "name": "Effects",
                "sliders": [
                        "PostCropVignetteAmount",
                        "PostCropVignetteMidpoint",
                        "PostCropVignetteFeather",
                        "PostCropVignetteRoundness",
                        "PostCropVignetteHighlightContrast",
                        "GrainAmount",
                        "GrainSize",
                        "GrainFrequency"
                ]
        },
        {
                "name": "Calibration",
                "sliders": [
                        "ShadowTint",
                        "RedHue",
                        "RedSaturation",
                        "GreenHue",
                        "GreenSaturation",
                        "BlueHue",
                        "BlueSaturation"
                ]
        },
        {
                "name": "Lens / Defringe",
                "sliders": [
                        "LensProfileDistortionScale",
                        "LensProfileChromaticAberrationScale",
                        "LensProfileVignettingScale",
                        "LensManualDistortionAmount",
                        "DefringePurpleAmount",
                        "DefringePurpleHueLo",
                        "DefringePurpleHueHi",
                        "DefringeGreenAmount",
                        "DefringeGreenHueLo",
                        "DefringeGreenHueHi"
                ]
        },
        {
                "name": "Transform",
                "sliders": [
                        "PerspectiveVertical",
                        "PerspectiveHorizontal",
                        "PerspectiveRotate",
                        "PerspectiveScale",
                        "PerspectiveAspect",
                        "PerspectiveX",
                        "PerspectiveY"
                ]
        },
        {
                "name": "Tone Curve",
                "sliders": [
                        "ParametricDarks",
                        "ParametricLights",
                        "ParametricShadows",
                        "ParametricHighlights",
                        "ParametricShadowSplit",
                        "ParametricMidtoneSplit",
                        "ParametricHighlightSplit"
                ]
        }
];

        const labels = {
        "Exposure": "Exposure",
        "Contrast": "Contrast",
        "Highlights": "Highlights",
        "Shadows": "Shadows",
        "Whites": "Whites",
        "Blacks": "Blacks",
        "Temperature": "Temperature",
        "Tint": "Tint",
        "Vibrance": "Vibrance",
        "Saturation": "Saturation",
        "Texture": "Texture",
        "Clarity": "Clarity",
        "Dehaze": "Dehaze",
        "Sharpness": "Sharpness",
        "SharpenRadius": "Sharpen Radius",
        "SharpenDetail": "Sharpen Detail",
        "SharpenEdgeMasking": "Sharpen Masking",
        "LuminanceNR": "Luminance Noise Reduction",
        "LuminanceNoiseReductionDetail": "Luminance NR Detail",
        "LuminanceNoiseReductionContrast": "Luminance NR Contrast",
        "ColorNR": "Color Noise Reduction",
        "ColorNoiseReductionDetail": "Color NR Detail",
        "ColorNoiseReductionSmoothness": "Color NR Smoothness",
        "HueAdjustmentRed": "Hue Red",
        "HueAdjustmentOrange": "Hue Orange",
        "HueAdjustmentYellow": "Hue Yellow",
        "HueAdjustmentGreen": "Hue Green",
        "HueAdjustmentAqua": "Hue Aqua",
        "HueAdjustmentBlue": "Hue Blue",
        "HueAdjustmentPurple": "Hue Purple",
        "HueAdjustmentMagenta": "Hue Magenta",
        "SaturationAdjustmentRed": "Saturation Red",
        "SaturationAdjustmentOrange": "Saturation Orange",
        "SaturationAdjustmentYellow": "Saturation Yellow",
        "SaturationAdjustmentGreen": "Saturation Green",
        "SaturationAdjustmentAqua": "Saturation Aqua",
        "SaturationAdjustmentBlue": "Saturation Blue",
        "SaturationAdjustmentPurple": "Saturation Purple",
        "SaturationAdjustmentMagenta": "Saturation Magenta",
        "LuminanceAdjustmentRed": "Luminance Red",
        "LuminanceAdjustmentOrange": "Luminance Orange",
        "LuminanceAdjustmentYellow": "Luminance Yellow",
        "LuminanceAdjustmentGreen": "Luminance Green",
        "LuminanceAdjustmentAqua": "Luminance Aqua",
        "LuminanceAdjustmentBlue": "Luminance Blue",
        "LuminanceAdjustmentPurple": "Luminance Purple",
        "LuminanceAdjustmentMagenta": "Luminance Magenta",
        "GrayMixerRed": "B&W Red",
        "GrayMixerOrange": "B&W Orange",
        "GrayMixerYellow": "B&W Yellow",
        "GrayMixerGreen": "B&W Green",
        "GrayMixerAqua": "B&W Aqua",
        "GrayMixerBlue": "B&W Blue",
        "GrayMixerPurple": "B&W Purple",
        "GrayMixerMagenta": "B&W Magenta",
        "PostCropVignetteAmount": "Vignette Amount",
        "PostCropVignetteMidpoint": "Vignette Midpoint",
        "PostCropVignetteFeather": "Vignette Feather",
        "PostCropVignetteRoundness": "Vignette Roundness",
        "PostCropVignetteHighlightContrast": "Vignette Highlights",
        "GrainAmount": "Grain Amount",
        "GrainSize": "Grain Size",
        "GrainFrequency": "Grain Roughness",
        "ShadowTint": "Shadow Tint",
        "RedHue": "Red Primary Hue",
        "RedSaturation": "Red Primary Saturation",
        "GreenHue": "Green Primary Hue",
        "GreenSaturation": "Green Primary Saturation",
        "BlueHue": "Blue Primary Hue",
        "BlueSaturation": "Blue Primary Saturation",
        "LensProfileDistortionScale": "Profile Distortion",
        "LensProfileEnable": "Enable Profile Corrections",
        "AutoLateralCA": "Remove Chromatic Aberration",
        "LensProfileChromaticAberrationScale": "Profile Chromatic Aberration Scale (old SDK / unsolved)",
        "LensProfileVignettingScale": "Profile Vignetting",
        "LensManualDistortionAmount": "Manual Distortion",
        "DefringePurpleAmount": "Purple Defringe Amount",
        "DefringePurpleHueLo": "Purple Hue Low",
        "DefringePurpleHueHi": "Purple Hue High",
        "DefringeGreenAmount": "Green Defringe Amount",
        "DefringeGreenHueLo": "Green Hue Low",
        "DefringeGreenHueHi": "Green Hue High",
        "PerspectiveVertical": "Transform Vertical",
        "PerspectiveHorizontal": "Transform Horizontal",
        "PerspectiveRotate": "Transform Rotate",
        "PerspectiveScale": "Transform Scale",
        "PerspectiveAspect": "Transform Aspect",
        "PerspectiveX": "Transform X Offset",
        "PerspectiveY": "Transform Y Offset",
        "ParametricDarks": "Curve Darks",
        "ParametricLights": "Curve Lights",
        "ParametricShadows": "Curve Shadows",
        "ParametricHighlights": "Curve Highlights",
        "ParametricShadowSplit": "Curve Shadow Split",
        "ParametricMidtoneSplit": "Curve Midtone Split",
        "ParametricHighlightSplit": "Curve Highlight Split"
};

        const actionGroups = [
                {
                        "name": "Crop",
                        "placement": "top",
                        "actions": [
                                {
                                        "label": "Reset Crop",
                                        "action": "resetCrop",
                                        "button": "Reset"
                                }
                        ]
                },
                {
                        "name": "Healing",
                        "placement": "top",
                        "actions": [
                                {
                                        "label": "Reset Spot Removal",
                                        "action": "resetSpotRemoval",
                                        "button": "Reset"
                                }
                        ]
                },
                {
                        "name": "Basic",
                        "placement": "before:Basic",
                        "actions": [
                                {
                                        "label": "Auto Tone",
                                        "action": "setAutoTone",
                                        "button": "Set"
                                }
                        ]
                },
                {
                        "name": "Color",
                        "placement": "before:Color",
                        "actions": [
                                {
                                        "label": "Auto White Balance",
                                        "action": "setAutoWhiteBalance",
                                        "button": "Set"
                                }
                        ]
                },
                {
                        "name": "Transform",
                        "placement": "before:Transform",
                        "actions": [
                                {
                                        "label": "Reset Transform",
                                        "action": "resetTransforms",
                                        "button": "Reset"
                                }
                        ]
                }
        ];

        const switchGroups = [
                {
                        "name": "Lens / Defringe",
                        "switches": [
                                {
                                        "label": "Remove Chromatic Aberration",
                                        "slider": "AutoLateralCA"
                                },
                                {
                                        "label": "Enable Profile Corrections",
                                        "slider": "LensProfileEnable"
                                }
                        ]
                }
        ];

        const content = document.getElementById("content");
        const statusBox = document.getElementById("status");

        function setStatus(message) {
            statusBox.textContent = message;
        }

        async function sendCommand(path) {
            setStatus("Sending: " + path);

            try {
                const response = await fetch(path, {
                    cache: "no-store"
                });

                const text = await response.text();

                if (!response.ok) {
                    setStatus("ERROR " + response.status + ": " + text);
                    return;
                }

                setStatus("OK: " + path);
            } catch (err) {
                setStatus("ERROR: " + err.message);
            }
        }

        function makeButton(text, className, onClick) {
            const button = document.createElement("button");
            button.textContent = text;
            button.className = className;
            button.addEventListener("click", onClick);
            return button;
        }

        function addSwitchRow(groupElement, item) {
            const row = document.createElement("div");
            row.className = "switch-row";

            const name = document.createElement("div");
            name.className = "slider-name";
            name.textContent = item.label;

            const status = document.createElement("div");
            status.className = "switch-status";

            row.appendChild(name);

            row.appendChild(makeButton("Off", "negative", function () {
                sendCommand("/api/adjust?slider=" + encodeURIComponent(item.slider) + "&amount=-5");
                status.textContent = "Set OFF";
            }));

            row.appendChild(makeButton(item.button || "Send", "positive", function () {
                sendCommand("/api/adjust?slider=" + encodeURIComponent(item.slider) + "&amount=5");
                status.textContent = "Set ON";
            }));

            row.appendChild(status);

            groupElement.appendChild(row);
        }

        function addSliderRow(groupElement, slider) {
            const row = document.createElement("div");
            row.className = "row";

            const name = document.createElement("div");
            name.className = "slider-name";
            name.textContent = labels[slider] || slider;

            row.appendChild(name);

            row.appendChild(makeButton("-5", "negative", function () {
                sendCommand("/api/adjust?slider=" + encodeURIComponent(slider) + "&amount=-5");
            }));

            row.appendChild(makeButton("-1", "negative", function () {
                sendCommand("/api/adjust?slider=" + encodeURIComponent(slider) + "&amount=-1");
            }));

            row.appendChild(makeButton("Reset", "reset", function () {
                sendCommand("/api/reset?slider=" + encodeURIComponent(slider));
            }));

            row.appendChild(makeButton("+1", "positive", function () {
                sendCommand("/api/adjust?slider=" + encodeURIComponent(slider) + "&amount=1");
            }));

            row.appendChild(makeButton("+5", "positive", function () {
                sendCommand("/api/adjust?slider=" + encodeURIComponent(slider) + "&amount=5");
            }));

            groupElement.appendChild(row);
        }

        function addActionRow(groupElement, item) {
            const row = document.createElement("div");
            row.className = "action-row";

            const name = document.createElement("div");
            name.className = "slider-name";
            name.textContent = item.label;

            const status = document.createElement("div");
            status.className = "switch-status";

            row.appendChild(name);

            row.appendChild(makeButton(item.button || "Send", "positive", function () {
                sendCommand("/api/action?action=" + encodeURIComponent(item.action));
                status.textContent = "Sent to Lightroom";
            }));

            row.appendChild(status);

            groupElement.appendChild(row);
        }

        function renderActionGroup(group) {
            const groupElement = document.createElement("section");
            groupElement.className = "group";

            const title = document.createElement("div");
            title.className = "group-title";
            title.textContent = group.name;

            groupElement.appendChild(title);

            for (const item of group.actions) {
                addActionRow(groupElement, item);
            }

            content.appendChild(groupElement);
        }

        function renderActionsForPlacement(placement) {
            for (const group of actionGroups) {
                if ((group.placement || "top") === placement) {
                    renderActionGroup(group);
                }
            }
        }

        function renderSwitches() {
            for (const group of switchGroups) {
                const groupElement = document.createElement("section");
                groupElement.className = "group";

                const title = document.createElement("div");
                title.className = "group-title";
                title.textContent = "Switches - " + group.name;

                groupElement.appendChild(title);

                for (const item of group.switches) {
                    addSwitchRow(groupElement, item);
                }

                content.appendChild(groupElement);
            }
        }

        function renderSliders() {
            renderActionsForPlacement("top");

            for (const group of groups) {
                renderActionsForPlacement("before:" + group.name);
                if (group.name === "Lens / Defringe") {
                    renderSwitches();
                }

                const groupElement = document.createElement("section");
                groupElement.className = "group";

                const title = document.createElement("div");
                title.className = "group-title";
                title.textContent = group.name;

                groupElement.appendChild(title);

                for (const slider of group.sliders) {
                    addSliderRow(groupElement, slider);
                }

                content.appendChild(groupElement);
            }
        }

        document.getElementById("openHelp").addEventListener("click", function () {
            window.open("/api/help", "_blank");
        });

        renderSliders();
    </script>
</body>
</html>
